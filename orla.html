<style>

/* =========================
   BODY
========================= */

body{
    margin:0;
    padding:40px;
    font-family:Georgia, serif;

    background:
        linear-gradient(rgba(255,255,255,0.92), rgba(255,255,255,0.92)),
        url("https://www.transparenttextures.com/patterns/aged-paper.png");
}

/* =========================
   MARCO
========================= */

.marco-orla{
    position:relative;

    max-width:1400px;
    margin:auto;

    padding:60px 50px;

    background:#fbf4e6;

    box-shadow:
        0 0 40px rgba(0,0,0,0.2),
        inset 0 0 25px rgba(179,139,77,0.25);
}

/* =========================
   ESQUINAS CENEFA
========================= */

.corner{
    position:absolute;
    width:180px;
    height:180px;

    background:url("fotos/cenefa4.png") no-repeat center;
    background-size:contain;

    pointer-events:none;
    opacity:0.95;
}

/* superior izquierda */
.corner.tl{
    top:-10px;
    left:-10px;
}

/* superior derecha */
.corner.tr{
    top:-10px;
    right:-10px;
    transform: scaleX(-1);
}

/* inferior izquierda */
.corner.bl{
    bottom:-10px;
    left:-10px;
    transform: scaleY(-1);
}

/* inferior derecha */
.corner.br{
    bottom:-10px;
    right:-10px;
    transform: scale(-1, -1);
}

/* =========================
   BOTÓN
========================= */

.toolbar{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

#toggleFotos{
    padding:10px 18px;
    font-size:14px;

    background:#b38b4d;
    color:white;

    border:none;
    border-radius:10px;

    cursor:pointer;

    box-shadow:0 6px 14px rgba(0,0,0,0.2);
}

#toggleFotos:hover{
    background:#8b6a2e;
}

/* =========================
   TITULO
========================= */

.titulo{
    text-align:center;
    margin:5px 0 20px;
}

.titulo h2{
    margin:0;

    font-size:clamp(18px, 4vw, 34px);

    letter-spacing:3px;
    color:#6f4a1f;

    text-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.titulo p{
    margin-top:8px;

    font-size:clamp(16px, 2.5vw, 25px);

    font-style:italic;
    color:#8a6a4a;
}

/* =========================
   CENEFAS DECORATIVAS
========================= */

.cenefa-titulo{
    display:block;
    margin:5px auto;

    width:min(250px, 80%);
    height:25px;

    opacity:.99;

/*    filter:
/*        sepia(100%)*/
/*        saturate(200%)*/
/*        hue-rotate(5deg);*/
}

/* =========================
   ORLA
========================= */

#orla{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:clamp(14px, 2vw, 28px);
    justify-items:center;
}

.alumno{
    width:100%;
    max-width:150px;
    text-align:center;
}

/* =========================
   FOTOS
========================= */

.foto-wrapper{
    position:relative;
    width:100%;
    max-width:150px;
    aspect-ratio:3/4;
    margin:auto;
}

.foto-principal{
    width:100%;
    height:100%;
    object-fit:cover;

    border-radius:50% / 38%;
    border:clamp(2px, 0.5vw, 5px) solid #d9bf8f;

    box-shadow:0 8px 18px rgba(0,0,0,0.18);
    cursor:pointer;
}

.foto-secundaria{
    position:absolute;
    bottom:-4%;
    right:-20%;

    width:40%;
    aspect-ratio:3/4;

    border-radius:50%;
    object-fit:cover;

    border:clamp(1px, 0.25vw, 3px) solid white;
    box-shadow:0 5px 14px rgba(0,0,0,0.28);
    cursor:pointer;
}

/* =========================
   TEXTO
========================= */

.nombre{
    margin-top:10px;
    font-size:12px;
    font-weight:bold;
    color:#050505;
}

.residencia{
    font-size:11px;
    font-style:italic;
    color:#050505;
}

/* =========================
   POPUP
========================= */

.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.82);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup img{
    max-width:85%;
    max-height:85vh;
    border-radius:20px;
    border:8px solid white;
    box-shadow:0 0 35px rgba(0,0,0,0.45);
    cursor:pointer;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width:768px){
    body{ padding:15px; }

    .marco-orla{
        padding:50px 20px;
    }

    .corner{
        width:130px;
        height:130px;
    }
}

@media (max-width:480px){
    .corner{
        width:100px;
        height:100px;
    }
}

</style>

data.forEach(alumno => {

    div.className = "alumno";

    div.innerHTML = `
    <div class="foto-wrapper">

        <img class="foto-principal abrir"
             src="${alumno.foto_bn}"
             data-bn="${alumno.foto_bn}"
             data-color="${alumno.foto_color}">

        <img class="foto-secundaria abrir"
             src="${alumno.foto_color}"
             data-bn="${alumno.foto_bn}"
             data-color="${alumno.foto_color}">

    </div>

    <div class="nombre">${alumno.nombre}</div>
    <div class="residencia">${alumno.residencia}</div>
    `;

    contenedor.appendChild(div);

/* POPUP */
const popup = document.getElementById("popup");
const imagenPopup = document.getElementById("imagenPopup");

document.addEventListener("click",(e)=>{

    if(e.target.classList.contains("abrir")){
        imagenPopup.src = e.target.src;
        popup.style.display = "flex";
    }

    if(e.target.id === "popup"){
        popup.style.display = "none";
    }
});

/* INTERCAMBIO */
let estadoBN = true;

document.getElementById("toggleFotos").addEventListener("click", () => {

    estadoBN = !estadoBN;

    document.querySelectorAll(".foto-wrapper").forEach(wrapper => {

        const principal = wrapper.querySelector(".foto-principal");
        const secundaria = wrapper.querySelector(".foto-secundaria");

        if(estadoBN){
            principal.src = principal.dataset.bn;
            secundaria.src = secundaria.dataset.color;
        } else {
            principal.src = principal.dataset.color;
            secundaria.src = secundaria.dataset.bn;
        }
    });
});
